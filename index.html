<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>iMAP Attendance</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    /* brand */
    --brand:#5ce1e6;
    --brand-bright:#7df0f4;
    --brand-deep:#27a9b3;
    --brand-glow:rgba(92,225,230,0.55);
    --brand-glow-soft:rgba(92,225,230,0.18);

    /* dark glass base */
    --bg-0:#06151A;
    --bg-1:#0A2027;
    --bg-2:#0E2C35;

    --glass:rgba(255,255,255,0.055);
    --glass-strong:rgba(255,255,255,0.09);
    --glass-border:rgba(255,255,255,0.13);
    --glass-border-bright:rgba(92,225,230,0.35);

    --text:#EAFBFC;
    --text-soft:#9FC4C9;
    --text-dim:#6E9197;

    /* repurposed names kept so inline JS styles still resolve */
    --curtain:var(--brand-deep);
    --gold:var(--brand);
    --gold-soft:var(--brand-bright);
    --ink-soft:var(--text-soft);
    --line:rgba(255,255,255,0.10);

    --present:#46e0a8;
    --present-bg:rgba(70,224,168,0.14);
    --absent:#ff7a85;
    --absent-bg:rgba(255,122,133,0.14);
    --dropin:#ffcd6b;
    --dropin-bg:rgba(255,205,107,0.14);

    --radius:16px;
    --shadow:0 10px 34px -12px rgba(0,0,0,0.55);
    --glow:0 0 0 1px var(--brand-glow-soft), 0 8px 30px -6px rgba(92,225,230,0.25);
  }
  *{box-sizing:border-box;}
  html,body{background:transparent;margin:0;padding:0;}
  body{
    font-family:'Inter',ui-sans-serif,system-ui,sans-serif;
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{font-family:'Space Grotesk',ui-sans-serif,system-ui,sans-serif;letter-spacing:-0.01em;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  :focus-visible{outline:2px solid var(--brand);outline-offset:2px;}

  #shell{
    position:relative;
    display:flex;
    min-height:100vh;
    background:
      radial-gradient(900px 500px at 12% -5%, rgba(92,225,230,0.18), transparent 60%),
      radial-gradient(800px 600px at 100% 110%, rgba(92,225,230,0.10), transparent 55%),
      linear-gradient(160deg, var(--bg-0), var(--bg-1) 55%, var(--bg-2));
    overflow:hidden;
  }
  /* ambient floating glow orbs */
  #shell::before, #shell::after{
    content:"";position:absolute;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;
  }
  #shell::before{width:420px;height:420px;background:rgba(92,225,230,0.16);top:-120px;right:8%;}
  #shell::after{width:360px;height:360px;background:rgba(92,225,230,0.10);bottom:-140px;left:20%;}
  #sidebar, #main{position:relative;z-index:1;}

  /* ---------- SIDEBAR ---------- */
  #sidebar{
    width:252px;flex-shrink:0;
    background:linear-gradient(180deg, rgba(8,26,32,0.85), rgba(6,21,26,0.7));
    backdrop-filter:blur(18px) saturate(140%);
    -webkit-backdrop-filter:blur(18px) saturate(140%);
    border-right:1px solid var(--glass-border);
    padding:22px 14px 16px;display:flex;flex-direction:column;gap:4px;
  }
  .brand{padding:0 8px 18px;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:14px;text-align:center;}
  .brand img{filter:drop-shadow(0 0 10px rgba(92,225,230,0.5));margin:0 auto;}
  .brand .sub{font-size:11px;color:var(--brand);letter-spacing:0.22em;text-transform:uppercase;margin-top:2px;font-weight:600;text-align:center;}
  .nav-label{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);padding:14px 10px 6px;}
  .nav-item-row{display:flex;align-items:stretch;gap:4px;}
  .nav-item{
    display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;min-width:0;flex:0 0 auto;
    padding:9px 12px;border-radius:11px;color:var(--text);font-size:14px;font-weight:500;
    background:transparent;border:1px solid transparent;text-align:left;
    transition:background .15s ease, color .15s ease, border-color .15s ease, box-shadow .15s ease;
  }
  .nav-item-row .nav-item{flex:1 1 auto;width:auto;}
  .nav-item span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .nav-item:hover{background:var(--glass);border-color:var(--glass-border);}
  .nav-item.active{
    background:linear-gradient(135deg, rgba(92,225,230,0.22), rgba(92,225,230,0.08));
    border-color:var(--glass-border-bright);color:#fff;
    box-shadow:0 0 18px -4px var(--brand-glow), inset 0 1px 0 rgba(255,255,255,0.12);
  }
  .nav-item .count{font-size:11px;color:var(--text-dim);font-weight:600;flex-shrink:0;}
  .nav-item.active .count{color:var(--brand-bright);}
  .nav-remove{
    flex-shrink:0;width:30px;border:1px solid transparent;border-radius:9px;background:transparent;color:var(--text-dim);
    font-size:15px;line-height:1;transition:all .15s ease;
  }
  .nav-remove:hover{background:rgba(255,122,133,0.18);color:#fff;border-color:rgba(255,122,133,0.3);}
  .nav-scroll{overflow-y:auto;flex:1;padding-right:2px;}
  #add-batch-btn{
    margin-top:10px;width:100%;padding:9px 12px;border-radius:11px;border:1px dashed var(--glass-border-bright);
    background:var(--brand-glow-soft);color:var(--brand-bright);font-size:13px;font-weight:600;transition:all .15s ease;
  }
  #add-batch-btn:hover{border-color:var(--brand);background:rgba(92,225,230,0.16);box-shadow:0 0 16px -6px var(--brand-glow);}
  .archived-batches-toggle{
    margin-top:6px;width:100%;padding:7px 12px;border:none;background:transparent;color:var(--text-dim);
    font-size:11.5px;text-decoration:underline;text-align:left;
  }

  /* ---------- MAIN ---------- */
  #main{flex:1;min-width:0;padding:28px 34px 70px;}
  .topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap;}
  .page-title{font-size:27px;font-weight:700;margin:0;color:#fff;text-shadow:0 0 24px rgba(92,225,230,0.25);}
  .page-sub{color:var(--text-soft);font-size:13.5px;margin-top:4px;}

  .glass, .card, .chip, .month-nav, .modal, .trend-card{
    background:var(--glass);
    backdrop-filter:blur(16px) saturate(140%);
    -webkit-backdrop-filter:blur(16px) saturate(140%);
    border:1px solid var(--glass-border);
    box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,0.08);
  }

  .chips{display:flex;gap:10px;flex-wrap:wrap;}
  .chip{border-radius:14px;padding:11px 16px;min-width:104px;}
  .chip .num{font-family:'Space Grotesk';font-size:22px;font-weight:700;line-height:1;}
  .chip .lbl{font-size:10.5px;color:var(--text-soft);text-transform:uppercase;letter-spacing:.06em;margin-top:5px;}
  .chip.present .num{color:var(--present);text-shadow:0 0 16px rgba(70,224,168,0.4);}
  .chip.absent .num{color:var(--absent);text-shadow:0 0 16px rgba(255,122,133,0.35);}
  .chip.dropin .num{color:var(--dropin);text-shadow:0 0 16px rgba(255,205,107,0.35);}
  .chip.fees .num{color:var(--brand);text-shadow:0 0 18px var(--brand-glow);}

  .month-nav{display:flex;align-items:center;gap:10px;border-radius:999px;padding:5px 6px;width:fit-content;}
  .month-nav button{background:var(--glass-strong);border:1px solid var(--glass-border);width:30px;height:30px;border-radius:50%;font-size:15px;color:var(--brand-bright);font-weight:700;transition:all .15s ease;}
  .month-nav button:hover{background:rgba(92,225,230,0.2);box-shadow:0 0 14px -4px var(--brand-glow);}
  .month-nav .label{font-weight:700;font-size:14px;min-width:122px;text-align:center;font-family:'Space Grotesk';color:#fff;}

  .tabs{display:flex;gap:6px;border-bottom:1px solid var(--glass-border);margin:22px 0 18px;overflow-x:auto;}
  .tab{padding:10px 4px;margin-right:20px;background:none;border:none;border-bottom:2px solid transparent;font-size:14px;font-weight:600;color:var(--text-soft);flex-shrink:0;white-space:nowrap;transition:color .15s ease;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--brand);border-bottom-color:var(--brand);text-shadow:0 0 14px var(--brand-glow);}

  .card{border-radius:var(--radius);padding:18px 20px;margin-bottom:18px;overflow-x:auto;}
  .card h3{font-size:15px;margin:0 0 12px;color:#fff;}

  .empty{border:1.5px dashed var(--glass-border);border-radius:var(--radius);padding:34px 22px;text-align:center;color:var(--text-soft);}
  .empty .e-title{color:#fff;font-weight:700;font-family:'Space Grotesk';font-size:16px;margin-bottom:6px;}

  .btn{
    display:inline-flex;align-items:center;gap:6px;border:1px solid var(--glass-border-bright);border-radius:11px;padding:9px 16px;font-size:13.5px;font-weight:600;
    background:linear-gradient(135deg, var(--brand), var(--brand-deep));color:#03252a;
    box-shadow:0 6px 20px -8px var(--brand-glow), inset 0 1px 0 rgba(255,255,255,0.4);
    transition:transform .12s ease, box-shadow .15s ease, filter .15s ease;
  }
  .btn:hover{filter:brightness(1.08);box-shadow:0 8px 26px -6px var(--brand-glow);transform:translateY(-1px);}
  .btn.secondary{background:var(--glass-strong);color:var(--text);border-color:var(--glass-border);box-shadow:none;}
  .btn.secondary:hover{background:rgba(255,255,255,0.14);filter:none;}
  .btn.ghost{background:transparent;color:var(--brand);padding:9px 10px;border-color:transparent;box-shadow:none;}
  .btn.danger{background:transparent;color:var(--absent);padding:6px 10px;font-size:12.5px;border-color:rgba(255,122,133,0.4);box-shadow:none;}
  .btn.danger:hover{background:rgba(255,122,133,0.14);filter:none;}
  .btn.small{padding:6px 12px;font-size:12.5px;border-radius:9px;}

  .roll-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 4px;border-bottom:1px solid var(--glass-border);flex-wrap:wrap;}
  .roll-row:last-child{border-bottom:none;}
  .student-name{font-weight:600;font-size:14.5px;color:var(--text);}
  .student-phone{font-size:12px;color:var(--text-soft);margin-top:1px;}
  .pillset{display:flex;gap:6px;}
  .edit-mini{
    flex-shrink:0;width:30px;height:30px;border-radius:9px;border:1px solid var(--glass-border);
    background:var(--glass-strong);color:var(--text-soft);font-size:14px;line-height:1;transition:all .12s ease;
  }
  .edit-mini:hover{color:var(--brand);border-color:var(--glass-border-bright);box-shadow:0 0 12px -4px var(--brand-glow);}
  .pill{
    width:40px;height:38px;min-height:42px;border-radius:11px;border:1px solid var(--glass-border);
    background:var(--glass-strong);font-weight:700;font-size:13px;color:var(--text-soft);transition:all .12s ease;
  }
  .pill:hover{transform:translateY(-1px);border-color:var(--glass-border-bright);}
  .pill.p.on{background:linear-gradient(135deg,var(--present),#28b07f);border-color:var(--present);color:#04261b;box-shadow:0 0 16px -3px rgba(70,224,168,0.6);}
  .pill.a.on{background:linear-gradient(135deg,var(--absent),#e0535f);border-color:var(--absent);color:#2a060a;box-shadow:0 0 16px -3px rgba(255,122,133,0.6);}
  .pill.d.on{background:linear-gradient(135deg,var(--dropin),#e0a838);border-color:var(--dropin);color:#2a1d03;box-shadow:0 0 16px -3px rgba(255,205,107,0.6);}

  table.summary{width:100%;border-collapse:collapse;font-size:13.5px;}
  table.summary th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-soft);padding:6px 8px;border-bottom:1px solid var(--glass-border);}
  table.summary td{padding:9px 8px;border-bottom:1px solid var(--glass-border);vertical-align:middle;color:var(--text);}
  table.summary tr:last-child td{border-bottom:none;}
  .filmstrip{display:flex;gap:3px;flex-wrap:wrap;max-width:260px;}
  .dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,0.12);display:inline-block;}
  .dot.p{background:var(--present);box-shadow:0 0 6px rgba(70,224,168,0.7);}
  .dot.a{background:var(--absent);box-shadow:0 0 6px rgba(255,122,133,0.6);}
  .dot.d{background:var(--dropin);box-shadow:0 0 6px rgba(255,205,107,0.6);}
  .count-badge{font-weight:700;font-family:'Space Grotesk';}
  .fee-input{width:92px;border:1px solid var(--glass-border);border-radius:9px;padding:6px 8px;font-size:13px;background:var(--glass-strong);color:var(--text);}
  .note-input{
    width:100%;min-width:180px;min-height:34px;border:1px solid var(--glass-border);border-radius:9px;
    padding:7px 9px;font-size:13px;background:var(--glass-strong);color:var(--text);
    resize:vertical;font-family:inherit;line-height:1.4;
  }
  .note-input::placeholder{color:var(--text-dim);}
  .note-input:focus{border-color:var(--brand);outline:none;box-shadow:0 0 0 3px var(--brand-glow-soft);}
  .fee-input:focus{border-color:var(--brand);outline:none;box-shadow:0 0 0 3px var(--brand-glow-soft);}

  .trend-card{border-radius:var(--radius);padding:20px 22px;margin-bottom:22px;}
  .trend-card h3{color:var(--text);font-size:13px;text-transform:uppercase;letter-spacing:.06em;opacity:.8;margin:0 0 14px;font-family:'Inter';font-weight:600;}
  .month-card-title{font-family:'Space Grotesk';font-weight:700;font-size:15px;margin-bottom:10px;display:flex;align-items:baseline;gap:8px;color:#fff;}
  table.ov{width:100%;border-collapse:collapse;font-size:13.5px;}
  table.ov th{text-align:left;font-size:11px;text-transform:uppercase;color:var(--text-soft);padding:5px 8px;border-bottom:1px solid var(--glass-border);}
  table.ov td{padding:7px 8px;border-bottom:1px solid rgba(255,255,255,0.06);color:var(--text);}
  table.ov tr.total-row td{font-weight:700;border-top:1.5px solid var(--glass-border-bright);border-bottom:none;}
  .batch-link{color:var(--text);text-decoration:none;font-weight:600;}
  .batch-link:hover{color:var(--brand);text-decoration:underline;}

  .legend{display:flex;gap:16px;align-items:center;font-size:12px;color:var(--text-soft);flex-wrap:wrap;}
  .legend .lg-item{display:flex;align-items:center;gap:5px;}

  .overlay{position:fixed;inset:0;background:rgba(3,12,15,0.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;}
  .modal{border-radius:18px;padding:24px;width:100%;max-width:400px;color:var(--text);}
  .modal h3{margin:0 0 14px;font-size:17px;color:#fff;}
  .modal p{color:var(--text-soft);}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--text-soft);margin-bottom:5px;}
  .field input,.field select{width:100%;padding:9px 11px;border:1px solid var(--glass-border);border-radius:10px;font-size:16px;background:var(--glass-strong);color:var(--text);}
  .field input:focus{border-color:var(--brand);outline:none;box-shadow:0 0 0 3px var(--brand-glow-soft);}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;flex-wrap:wrap;}

  #toast{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(0);
    background:rgba(8,28,34,0.92);backdrop-filter:blur(12px);color:#fff;padding:11px 18px;border-radius:999px;font-size:13px;font-weight:600;
    border:1px solid var(--glass-border-bright);box-shadow:0 10px 30px rgba(0,0,0,0.4), 0 0 20px -6px var(--brand-glow);
    z-index:100;opacity:0;pointer-events:none;transition:opacity .2s ease, transform .2s ease;
    display:flex;align-items:center;gap:14px;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);pointer-events:auto;}
  #toast.error{border-color:rgba(255,122,133,0.5);}
  #toast .toast-action{background:var(--brand);color:#03252a;border:none;border-radius:999px;padding:5px 13px;font-size:12.5px;font-weight:700;cursor:pointer;}
  #toast .toast-action:hover{filter:brightness(1.08);}

  table.dropins{width:100%;border-collapse:collapse;font-size:13.5px;}
  table.dropins th{text-align:left;font-size:11px;text-transform:uppercase;color:var(--text-soft);padding:7px 8px;border-bottom:1px solid var(--glass-border);}
  table.dropins td{padding:8px 8px;border-bottom:1px solid var(--glass-border);color:var(--text);}

  .row-actions{display:flex;gap:4px;flex-wrap:wrap;}
  .archived-toggle{font-size:12.5px;color:var(--text-soft);background:none;border:none;text-decoration:underline;padding:4px;}

  /* celebration */
  #celebrate{
    position:fixed;top:16%;left:50%;transform:translateX(-50%) scale(0.7);
    background:linear-gradient(135deg, rgba(92,225,230,0.9), rgba(39,169,179,0.9));
    backdrop-filter:blur(10px);color:#03252a;
    padding:18px 32px;border-radius:20px;font-family:'Space Grotesk';font-weight:700;font-size:19px;
    border:1px solid rgba(255,255,255,0.4);
    box-shadow:0 24px 60px -10px var(--brand-glow), 0 0 40px -4px var(--brand-glow), inset 0 1px 0 rgba(255,255,255,0.5);
    opacity:0;pointer-events:none;z-index:200;text-align:center;
    transition:opacity .25s ease, transform .25s ease;
  }
  #celebrate.show{opacity:1;transform:translateX(-50%) scale(1);animation:celebrate-pop 1.6s ease;}
  #celebrate .sub{display:block;font-family:'Inter';font-weight:600;font-size:12.5px;opacity:0.8;margin-top:4px;}
  @keyframes celebrate-pop{
    0%{transform:translateX(-50%) scale(0.7);}
    15%{transform:translateX(-50%) scale(1.08);}
    30%{transform:translateX(-50%) scale(1);}
    100%{transform:translateX(-50%) scale(1);}
  }

  input, select, textarea{font-size:16px;}
  @media (prefers-reduced-motion: reduce){ #celebrate.show{animation:none;} #shell::before,#shell::after{display:none;} }

  @media (max-width: 780px){
    #shell{flex-direction:column;}
    #sidebar{width:100%;flex-direction:row;align-items:center;overflow-x:auto;padding:10px 12px;gap:8px;border-right:none;border-bottom:1px solid var(--glass-border);}
    .brand{display:flex;align-items:center;padding:0;border-bottom:none;margin:0;margin-right:4px;flex-shrink:0;}
    .brand img{max-width:78px!important;margin-bottom:0!important;}
    .brand .sub{display:none;}
    .nav-label{display:none;}
    .nav-scroll{display:flex;flex:none;overflow:visible;gap:6px;}
    .nav-item-row{flex-shrink:0;white-space:nowrap;}
    .nav-item{width:auto;white-space:nowrap;}
    #add-batch-btn{width:auto;white-space:nowrap;margin:0;flex-shrink:0;}
    .archived-batches-toggle{width:auto;white-space:nowrap;flex-shrink:0;}
    #main{padding:20px 16px 50px;}
  }
</style>
</head>
<body>
<div id="shell">
  <nav id="sidebar"></nav>
  <main id="main"></main>
</div>
<div id="toast"></div>
<div id="celebrate"></div>

<script>
/* ============================= CONSTANTS ============================= */
const DEFAULT_BATCHES = ['Jazz Training','Bollywood','Bollywood Adv','Contemporary','Jazz Funk',

let STORE_MODE = 'local';
let fbRoot = null;
const LS_PREFIX = 'imap:';

function _loadScript(src){
  return new Promise((resolve, reject)=>{
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = ()=>reject(new Error('Failed to load '+src));
    document.head.appendChild(s);
  });
}

async function initStorage(){
  if(FIREBASE_CONFIG && FIREBASE_CONFIG.databaseURL){
    try{
      await _loadScript('https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js');
      await _loadScript('https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js');
      firebase.initializeApp(FIREBASE_CONFIG);
      fbRoot = firebase.database().ref('imap_attendance');
      STORE_MODE = 'firebase';
    }catch(e){
      console.error('Firebase init failed — using this device only.', e);
      STORE_MODE = 'local';
      setTimeout(()=>showToast('Cloud sync unavailable — saving to this device only', true), 1000);
    }
  }
}

async function storeGet(key, fallback){
  try{
    if(STORE_MODE === 'firebase'){
      const snap = await fbRoot.child(key).get();
      return snap.exists() ? snap.val() : fallback;
    }
    const v = localStorage.getItem(LS_PREFIX + key);
    return v === null ? fallback : JSON.parse(v);
  }catch(e){ return fallback; }
}
async function storeSet(key, value){
  try{
    if(STORE_MODE === 'firebase'){
      await fbRoot.child(key).set(value);
      return true;
    }
    localStorage.setItem(LS_PREFIX + key, JSON.stringify(value));
    return true;
  }catch(e){ showToast('Could not save changes', true); return null; }
}
async function storeList(prefix){
  try{
    if(STORE_MODE === 'firebase'){
      const snap = await fbRoot.get();
      if(!snap.exists()) return [];
      return Object.keys(snap.val()).filter(k => !prefix || k.startsWith(prefix));
    }
    const keys = [];
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(k && k.startsWith(LS_PREFIX)){
        const real = k.slice(LS_PREFIX.length);
        if(!prefix || real.startsWith(prefix)) keys.push(real);
      }
    }
    return keys;
  }catch(e){ return []; }
}

/* ============================= DATE HELPERS ============================= */
function pad(n){ return n<10 ? '0'+n : ''+n; }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function currentMonthStr(){ const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1); }
function monthOf(dateStr){ return dateStr.slice(0,7); }
function monthLabel(m){ const [y,mo]=m.split('-').map(Number); return MONTH_NAMES[mo-1]+' '+y; }
function shiftMonth(m, delta){
  let [y,mo]=m.split('-').map(Number);
  mo += delta;
  while(mo>12){mo-=12;y+=1;}
  while(mo<1){mo+=12;y-=1;}
  return y+'-'+pad(mo);
}
function shortDate(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return days[d.getDay()]+' '+d.getDate()+' '+MONTH_NAMES[d.getMonth()].slice(0,3);
}
function uid(){ return 'id_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8); }

/* ============================= INIT / LOAD ============================= */
async function init(){
  await initStorage();
  UI.markDate = todayStr();      // always start on today's class
  UI.month = currentMonthStr();
  await loadCoreData();
  UI.ready = true;
  render();
  loadOverview();

  // When a staff member returns to the tab (e.g. after another device updated the
  // shared cloud data), quietly pull the latest so they see current numbers.
  document.addEventListener('visibilitychange', ()=>{
    if(document.visibilityState === 'visible' && STORE_MODE === 'firebase'){
      reloadFromStore();
    }
  });
}

async function loadCoreData(){
  const [batches, students, dropins] = await Promise.all([
    storeGet('batches', null),
    storeGet('students', []),
    storeGet('dropins', []),
  ]);
  if(batches === null){
    DB.batches = DEFAULT_BATCHES.map(name => ({id:uid(), name, archived:false}));
    await storeSet('batches', DB.batches);
  } else {
    DB.batches = batches;
  }
  DB.students = students || [];
  DB.dropins = dropins || [];
}

async function reloadFromStore(){
  await loadCoreData();
  CACHE.attendance = {}; CACHE.fees = {}; CACHE.enrollment = {};   // drop stale cache, will re-fetch on demand
  if(UI.view === 'batch' && UI.batchId){ await ensureMonthLoaded(UI.batchId, UI.month); }
  render();
  if(UI.view === 'overview'){ loadOverview(); }
}

function cacheKey(batchId, month){ return batchId+'__'+month; }

async function ensureMonthLoaded(batchId, month){
  const k = cacheKey(batchId, month);
  const tasks = [];
  if(!(k in CACHE.attendance)) tasks.push(storeGet('attendance:'+k, {}).then(v=>CACHE.attendance[k]=v));
  if(!(k in CACHE.fees)) tasks.push(storeGet('fees:'+k, {}).then(v=>CACHE.fees[k]=v));
  if(!(k in CACHE.enrollment)) tasks.push(storeGet('enrollment:'+k, null).then(v=>CACHE.enrollment[k]=v));
  if(tasks.length) await Promise.all(tasks);
  // First time this month is opened: build its roster (carry forward from the
  // previous month + anyone who already has data this month) and save it.
  if(CACHE.enrollment[k] == null){
    CACHE.enrollment[k] = await seedEnrollment(batchId, month);
    await storeSet('enrollment:'+k, CACHE.enrollment[k]);
  }
}

async function latestPriorEnrollment(batchId, month){
  const keys = await storeList('enrollment:'+batchId+'__');
  const months = keys.map(x=>x.split('__')[1]).filter(m=>m < month).sort();
  if(!months.length) return null;
  const pm = months[months.length-1];
  const k = cacheKey(batchId, pm);
  if(!(k in CACHE.enrollment)) CACHE.enrollment[k] = await storeGet('enrollment:'+k, {});
  return CACHE.enrollment[k] || {};
}

async function seedEnrollment(batchId, month){
  const seed = {};
  const k = cacheKey(batchId, month);
  // New months start empty. We only auto-include anyone who ALREADY has attendance
  // or fees recorded for this month, so existing data always stays visible/consistent.
  Object.values(CACHE.attendance[k] || {}).forEach(day=>Object.keys(day).forEach(id=>seed[id]=true));
  Object.keys(CACHE.fees[k] || {}).forEach(id=>seed[id]=true);
  // keep only students that still exist in the directory
  const existing = new Set(DB.students.filter(s=>s.batchId===batchId).map(s=>s.id));
  Object.keys(seed).forEach(id=>{ if(!existing.has(id)) delete seed[id]; });
  return seed;
}

/* ============================= COMPUTE ============================= */
function activeStudents(batchId){
  return DB.students.filter(s=>s.batchId===batchId && !s.archived);
}
function archivedStudents(batchId){
  return DB.students.filter(s=>s.batchId===batchId && s.archived);
}
// Students enrolled in a specific month (the per-month roster)
function enrolledStudents(batchId, month){
  const en = CACHE.enrollment[cacheKey(batchId, month)] || {};
  return DB.students.filter(s=>s.batchId===batchId && en[s.id])
                    .sort((a,b)=>a.name.localeCompare(b.name));
}
// Batch students NOT in this month's roster (available to re-add)
function studentsNotInMonth(batchId, month){
  const en = CACHE.enrollment[cacheKey(batchId, month)] || {};
  return DB.students.filter(s=>s.batchId===batchId && !en[s.id])
                    .sort((a,b)=>a.name.localeCompare(b.name));
}
async function enrollInMonth(studentId, batchId, month){
  const k = cacheKey(batchId, month);
  if(!CACHE.enrollment[k]) CACHE.enrollment[k] = {};
  CACHE.enrollment[k][studentId] = true;
  await storeSet('enrollment:'+k, CACHE.enrollment[k]);
  render();
}
async function enrollAllInMonth(batchId, month){
  const k = cacheKey(batchId, month);
  if(!CACHE.enrollment[k]) CACHE.enrollment[k] = {};
  const toAdd = studentsNotInMonth(batchId, month);
  if(!toAdd.length){ showToast('Everyone is already in '+monthLabel(month)); return; }
  toAdd.forEach(s=>CACHE.enrollment[k][s.id]=true);
  await storeSet('enrollment:'+k, CACHE.enrollment[k]);
  showToast('Added '+toAdd.length+' student'+(toAdd.length===1?'':'s')+' to '+monthLabel(month));
  render();
}
async function removeFromMonth(studentId, batchId, month){
  const k = cacheKey(batchId, month);
  if(CACHE.enrollment[k]){ delete CACHE.enrollment[k][studentId]; await storeSet('enrollment:'+k, CACHE.enrollment[k]); }
  const batch = DB.batches.find(b=>b.id===batchId);
  closeModal();
  render();
  showToast('Removed from '+monthLabel(month), false, { label:'Undo', fn:()=>enrollInMonth(studentId, batchId, month) });
}
function studentName(id){
  const s = DB.students.find(x=>x.id===id);
  return s ? s.name : 'Removed student';
}

function tallyMonth(batchId, month){
  const k = cacheKey(batchId, month);
  const att = CACHE.attendance[k] || {};
  const fees = CACHE.fees[k] || {};
  let present=0, absent=0, dropin=0;
  Object.values(att).forEach(dayObj=>{
    Object.values(dayObj).forEach(status=>{
      if(status==='P') present++;
      else if(status==='A') absent++;
      else if(status==='D') dropin++;
    });
  });
  let feeTotal = Object.values(fees).reduce((a,b)=>a+(Number(b)||0),0);
  // logged drop-ins for this batch + month: count them and add their amounts to fees
  DB.dropins.forEach(d=>{
    if(d.batchId===batchId && monthOf(d.date)===month){
      dropin += 1;
      feeTotal += Number(d.amount)||0;
    }
  });
  return {present, absent, dropin, feeTotal};
}

function dropinSummary(batchId, month){
  let count=0, amount=0;
  DB.dropins.forEach(d=>{
    if(d.batchId===batchId && monthOf(d.date)===month){ count++; amount += Number(d.amount)||0; }
  });
  return {count, amount};
}

function rowsForMonthlySummary(batchId, month){
  const k = cacheKey(batchId, month);
  const att = CACHE.attendance[k] || {};
  const fees = CACHE.fees[k] || {};
  const ids = new Set(enrolledStudents(batchId, month).map(s=>s.id));
  Object.values(att).forEach(dayObj=>Object.keys(dayObj).forEach(id=>ids.add(id)));
  Object.keys(fees).forEach(id=>ids.add(id));
  const dates = Object.keys(att).sort();
  return Array.from(ids).map(id=>{
    let p=0,a=0,d=0;
    const marks = dates.map(date=>({date, status: att[date][id] || null}));
    marks.forEach(m=>{ if(m.status==='P')p++; else if(m.status==='A')a++; else if(m.status==='D')d++; });
    return { id, name: studentName(id), marks, present:p, absent:a, dropin:d, fee: fees[id] ?? '' };
  }).sort((x,y)=>x.name.localeCompare(y.name));
}

async function loadOverview(){
  UI.ovLoading = true; if(UI.view==='overview') render();
  const [attKeys, feeKeys] = await Promise.all([storeList('attendance:'), storeList('fees:')]);
  const combos = new Set();
  attKeys.forEach(k=>combos.add(k.replace('attendance:','')));
  feeKeys.forEach(k=>combos.add(k.replace('fees:','')));
  DB.dropins.forEach(d=>{ if(d.batchId) combos.add(d.batchId+'__'+monthOf(d.date)); });
  await Promise.all(Array.from(combos).map(combo=>{
    const [batchId, month] = combo.split('__');
    return ensureMonthLoaded(batchId, month);
  }));
  const months = new Set();
  combos.forEach(c=>months.add(c.split('__')[1]));
  const monthList = Array.from(months).sort().reverse();
  const data = monthList.map(month=>{
    const rows = DB.batches.map(b=>{
      const t = tallyMonth(b.id, month);
      return {batchId:b.id, name:b.name, ...t};
    }).filter(r=>r.present||r.absent||r.dropin||r.feeTotal);
    const total = rows.reduce((acc,r)=>({
      present:acc.present+r.present, absent:acc.absent+r.absent, dropin:acc.dropin+r.dropin, feeTotal:acc.feeTotal+r.feeTotal
    }), {present:0,absent:0,dropin:0,feeTotal:0});
    return {month, rows, total};
  }).filter(m=>m.rows.length);
  UI.ovData = data;
  UI.ovLoading = false;
  if(UI.view==='overview') render();
}

async function togglePill(studentId, status){
  const batchId = UI.batchId, date = UI.markDate, month = UI.month;

  if(!CACHE.attendance[k][date]) CACHE.attendance[k][date] = {};

  if(day[studentId]===undefined) delete day[studentId];
  render();
  await storeSet('attendance:'+k, CACHE.attendance[k]);

  const dayKey = batchId+'|'+date;

  }
}

/* ---- CSV export ---- */
function downloadCSV(filename, rows){
  const csv = rows.map(r=>r.map(cell=>{
    const s = (cell==null?'':String(cell));
    return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  }).join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

function exportBatchMonth(batchId, month){
  const batch = DB.batches.find(b=>b.id===batchId);
  const rows = rowsForMonthlySummary(batchId, month);
  const k = cacheKey(batchId, month);
  const dates = Object.keys(CACHE.attendance[k] || {}).sort();
  const header = ['Student', ...dates.map(shortDate), 'Present', 'Absent', 'Drop-in', 'Fees (INR)'];
  const body = rows.map(r=>{
    const byDate = {};
    r.marks.forEach(m=>byDate[m.date]=m.status||'');
    return [r.name, ...dates.map(d=>byDate[d]||''), r.present, r.absent, r.dropin||0, r.fee===''?'':r.fee];
  });
  const totals = tallyMonth(batchId, month);
  body.push([]);
  body.push(['TOTAL', ...dates.map(()=>''), totals.present, totals.absent, totals.dropin, totals.feeTotal]);
  downloadCSV((batch?batch.name.replace(/[^a-z0-9]+/gi,'_'):'batch')+'_'+month+'.csv', [header, ...body]);
  showToast('Exported '+monthLabel(month));
}

async function exportAllFees(){
  showToast('Preparing export…');
  // make sure overview data is loaded
  if(!UI.ovData){ await loadOverview(); }
  const data = UI.ovData || [];
  const header = ['Month','Batch','Present','Absent','Drop-in','Fees (INR)'];
  const body = [];
  data.slice().reverse().forEach(m=>{
    m.rows.forEach(r=>{
      body.push([monthLabel(m.month), r.name, r.present, r.absent, r.dropin, r.feeTotal]);
    });
    body.push([monthLabel(m.month), 'TOTAL', m.total.present, m.total.absent, m.total.dropin, m.total.feeTotal]);
    body.push([]);
  });
  downloadCSV('iMAP_fees_export.csv', [header, ...body]);
  showToast('Fees exported');
}

async function deleteStudent(id){
  const s = DB.students.find(x=>x.id===id);
  if(!s) return;
  const batchId = s.batchId;
  // remove from roster
  DB.students = DB.students.filter(x=>x.id!==id);
  await storeSet('students', DB.students);
  // purge their attendance marks across this batch's months
  const attKeys = await storeList('attendance:'+batchId+'__');
  for(const fullKey of attKeys){
    const data = await storeGet(fullKey, {});
    let changed = false;
    Object.keys(data).forEach(date=>{
      if(data[date] && (id in data[date])){ delete data[date][id]; changed = true; }
    });
    if(changed){ CACHE.attendance[fullKey.replace('attendance:','')] = data; await storeSet(fullKey, data); }
  }
  // purge their fee entries across this batch's months
  const feeKeys = await storeList('fees:'+batchId+'__');
  for(const fullKey of feeKeys){
    const data = await storeGet(fullKey, {});
    if(id in data){ delete data[id]; CACHE.fees[fullKey.replace('fees:','')] = data; await storeSet(fullKey, data); }
  }
  // purge from every month's enrollment
  const enKeys = await storeList('enrollment:'+batchId+'__');
  for(const fullKey of enKeys){
    const data = await storeGet(fullKey, {});
    if(id in data){ delete data[id]; CACHE.enrollment[fullKey.replace('enrollment:','')] = data; await storeSet(fullKey, data); }
  }
  closeModal();
  render();
  showToast('Student deleted');
}

      <td>${escapeHtml(d.date)}</td><td>${escapeHtml(d.name)}</td><td>${escapeHtml(d.contact||'—')}</td>
      <td>${escapeHtml(batchName(d.batchId) || d.style || '—')}</td>
      <td style="color:var(--brand);font-weight:600;">${(Number(d.amount)||0) ? '₹'+formatNum(d.amount) : '—'}</td>
      <td>${escapeHtml(d.remark||'—')}</td>
      <td><button class="btn danger" onclick="removeDropin('${d.id}')">Remove</button></td>
    </tr>`).join('');
  const totalRevenue = DB.dropins.reduce((a,d)=>a+(Number(d.amount)||0),0);

  const batchOptions = DB.batches.filter(b=>!b.archived)
    .map(b=>`<option value="${b.id}">${escapeHtml(b.name)}</option>`).join('');

  return `
    <div class="topbar"><div><h1 class="page-title">Drop-ins</h1>
    <div class="page-sub">One-off walk-ins. The amount paid is added to that batch's fees for that month.</div></div></div>
    <div class="card">
      <h3>Log a drop-in</h3>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;">
        <div class="field" style="min-width:130px;"><label>Date</label><input id="di-date" type="date" value="${todayStr()}"/></div>
        <div class="field" style="min-width:140px;"><label>Name</label><input id="di-name" type="text" placeholder="Visitor name"/></div>
        <div class="field" style="min-width:130px;"><label>Contact</label><input id="di-contact" type="text" placeholder="Phone"/></div>
        <div class="field" style="min-width:150px;"><label>Batch</label><select id="di-batch"><option value="">— Select batch —</option>${batchOptions}</select></div>
        <div class="field" style="min-width:110px;"><label>Amount paid (₹)</label><input id="di-amount" type="number" inputmode="numeric" placeholder="0"/></div>
        <div class="field" style="min-width:150px;"><label>Remark</label><input id="di-remark" type="text" placeholder="Optional note"/></div>
        <button class="btn" style="height:38px;" onclick="submitDropin()">Add</button>
      </div>
      <div style="font-size:12px;color:var(--text-soft);margin-top:8px;">Pick the batch the walk-in attended so their payment counts towards that batch's monthly fees. Leave batch blank for a general drop-in (won't roll into any batch).</div>
    </div>
    <div class="card">
      ${DB.dropins.length ? `<div style="display:flex;justify-content:flex-end;margin-bottom:8px;font-size:13px;color:var(--text-soft);">Total drop-in revenue: <strong style="color:var(--brand);margin-left:6px;">₹${formatNum(totalRevenue)}</strong></div>
        <table class="dropins"><thead><tr><th>Date</th><th>Name</th><th>Contact</th><th>Batch</th><th>Amount</th><th>Remark</th><th></th></tr></thead><tbody>${rows}</tbody></table>`
        : `<div class="empty"><div class="e-title">No drop-ins logged yet</div>Add the first walk-in above.</div>`}
    </div>
  `;
}

/* ---------- BATCH VIEW ---------- */
function renderBatch(){
  const batch = DB.batches.find(b=>b.id===UI.batchId);
  if(!batch) return `<div class="empty">Batch not found.</div>`;
  const totals = tallyMonth(UI.batchId, UI.month);

  const tabs = `
    <div class="tabs">
      <button class="tab ${UI.subview==='mark'?'active':''}" onclick="setTab('mark')">Mark attendance</button>
      <button class="tab ${UI.subview==='grid'?'active':''}" onclick="setTab('grid')">Monthly summary</button>
      <button class="tab ${UI.subview==='roster'?'active':''}" onclick="setTab('roster')">Students</button>
    </div>`;

  let content;
  if(UI.subview==='mark') content = renderMarkTab(batch);
  else if(UI.subview==='grid') content = renderGridTab(batch);
  else content = renderRosterTab(batch);

  return `
    <div class="topbar">
      <div>
        <h1 class="page-title">${escapeHtml(batch.name)}</h1>
        <div class="page-sub">${enrolledStudents(batch.id, UI.month).length} student${enrolledStudents(batch.id, UI.month).length===1?'':'s'} in ${monthLabel(UI.month)}</div>
      </div>
      <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
        <div class="chips">
          <div class="chip present"><div class="num">${totals.present}</div><div class="lbl">Present</div></div>
          <div class="chip absent"><div class="num">${totals.absent}</div><div class="lbl">Absent</div></div>
          <div class="chip dropin"><div class="num">${totals.dropin}</div><div class="lbl">Drop-in</div></div>
          <div class="chip fees"><div class="num">₹${formatNum(totals.feeTotal)}</div><div class="lbl">Fees</div></div>
        </div>
      </div>
    </div>
    <div class="month-nav" style="width:fit-content;margin-bottom:4px;">
      <button onclick="changeMonth(-1)">‹</button>
      <div class="label">${monthLabel(UI.month)}</div>
      <button onclick="changeMonth(1)">›</button>
    </div>
    ${tabs}
    ${content}
  `;
}

function renderMarkTab(batch){
  const students = enrolledStudents(batch.id, UI.month);
  const k = cacheKey(batch.id, UI.month);
  const dayMarks = (CACHE.attendance[k] || {})[UI.markDate] || {};

  const rows = students.map(s=>{
    const status = dayMarks[s.id];
    return `
      <div class="roll-row">
        <div style="display:flex;align-items:center;gap:8px;">
          <button class="edit-mini" title="Edit or remove ${escapeHtml(s.name)}" onclick="openModal('editStudent', {id:'${s.id}'})">✎</button>
          <div>
            <div class="student-name">${escapeHtml(s.name)}</div>
            ${s.phone ? `<div class="student-phone">${escapeHtml(s.phone)}</div>` : ''}
          </div>
        </div>
        <div class="pillset">
          <button class="pill p ${status==='P'?'on':''}" title="Present" onclick="togglePill('${s.id}','P')">P</button>
          <button class="pill a ${status==='A'?'on':''}" title="Absent" onclick="togglePill('${s.id}','A')">A</button>
          <button class="pill d ${status==='D'?'on':''}" title="Drop-in" onclick="togglePill('${s.id}','D')">D</button>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:6px;">
        <div style="font-weight:600;font-size:14px;">Marking for
          <input type="date" value="${UI.markDate}" style="border:1px solid var(--line);border-radius:8px;padding:5px 8px;font-size:16px;margin-left:6px;"
            onchange="changeMarkDate(this.value)"/>
          <span style="color:var(--ink-soft);font-weight:500;margin-left:6px;">(${shortDate(UI.markDate)})</span>
        </div>
        <div class="legend">
          <span class="lg-item"><span class="dot p"></span>Present</span>
          <span class="lg-item"><span class="dot a"></span>Absent</span>
          <span class="lg-item"><span class="dot d"></span>Drop-in</span>
        </div>
      </div>
      ${students.length ? rows : (function(){
        const notIn = studentsNotInMonth(batch.id, UI.month);
        if(notIn.length){
          return `<div class="empty"><div class="e-title">No students in ${monthLabel(UI.month)} yet</div>
            You have ${notIn.length} student${notIn.length===1?'':'s'} in this batch who aren't added to this month.<br/><br/>
            <button class="btn" onclick="setTab('roster')">Add students to ${monthLabel(UI.month)}</button></div>`;
        }
        return `<div class="empty"><div class="e-title">No students in this batch yet</div>Add your first student to start marking attendance.<br/><br/>
          <button class="btn" onclick="openModal('addStudent')">+ Add student</button></div>`;
      })()}
      ${students.length ? `<div style="margin-top:14px;"><button class="btn secondary small" onclick="openModal('addStudent')">+ Add student</button></div>` : ''}
    </div>
  `;
}

function renderGridTab(batch){
  const rows = rowsForMonthlySummary(batch.id, UI.month);
  if(!rows.length){
    return `<div class="card"><div class="empty"><div class="e-title">Nothing to summarise yet</div>Mark a few days of attendance for ${monthLabel(UI.month)} first.</div></div>`;
  }
  const body = rows.map(r=>{
    const dots = r.marks.map(m=>`<span class="dot ${m.status?m.status.toLowerCase():''}" title="${shortDate(m.date)}${m.status?': '+m.status:''}"></span>`).join('');
    return `
      <tr>
        <td><div class="student-name">${escapeHtml(r.name)}</div></td>
        <td><div class="filmstrip">${dots || '<span style=\"color:var(--ink-soft);\">—</span>'}</div></td>
        <td class="count-badge" style="color:var(--present);">${r.present}</td>
        <td class="count-badge" style="color:var(--absent);">${r.absent}</td>
        <td><input class="fee-input" type="number" placeholder="₹0" value="${r.fee}"
              onchange="saveFee('${batch.id}','${UI.month}','${r.id}', this.value)"/></td>
      </tr>`;
  }).join('');

  const ds = dropinSummary(batch.id, UI.month);
  return `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;flex-wrap:wrap;">
        <h3 style="margin:0;">${monthLabel(UI.month)} — fees & attendance</h3>
        <button class="btn secondary small" onclick="exportBatchMonth('${batch.id}','${UI.month}')">⬆ Export month (CSV)</button>
      </div>
      <table class="summary">
        <thead><tr><th>Student</th><th>Attendance timeline</th><th>Present</th><th>Absent</th><th>Fees (₹)</th></tr></thead>
        <tbody>${body}</tbody>
      </table>
      ${ds.count ? `<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--glass-border);font-size:13px;color:var(--text-soft);display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;">
        <span>+ ${ds.count} drop-in${ds.count===1?'':'s'} this month <span style="opacity:.7;">(logged in the Drop-ins section)</span></span>
        <span style="color:var(--brand);font-weight:600;">₹${formatNum(ds.amount)} added to fees</span>
      </div>` : ''}
    </div>`;
}

function renderRosterTab(batch){
  const month = UI.month;
  const enrolled = enrolledStudents(batch.id, month);
  const notIn = studentsNotInMonth(batch.id, month);
  const row = (s) => `
    <tr>
      <td><div class="student-name">${escapeHtml(s.name)}</div>${s.plan?`<div class="student-phone">${escapeHtml(s.plan)}</div>`:''}</td>
      <td>${escapeHtml(s.phone||'—')}</td>
      <td><textarea class="note-input" rows="1" placeholder="Pending fees, carry-forward…"
            onchange="saveStudentNote('${s.id}', this.value)">${escapeHtml(s.notes||'')}</textarea></td>
      <td class="row-actions">
        <button class="btn secondary small" onclick="openModal('editStudent', {id:'${s.id}'})">Edit</button>
        <button class="btn secondary small" onclick="removeFromMonth('${s.id}','${batch.id}','${month}')" title="Remove from ${monthLabel(month)} only">Remove from month</button>
        <button class="btn danger" onclick="openModal('confirmDeleteStudent', {id:'${s.id}'})">Delete</button>
      </td>
    </tr>`;

  return `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;gap:8px;flex-wrap:wrap;">
        <h3 style="margin:0;">Students in ${monthLabel(month)}</h3>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn small" onclick="openModal('addStudent')">+ Add new student</button>
        </div>
      </div>
      <div style="font-size:12px;color:var(--text-soft);margin:0 0 12px;">This list is just for ${monthLabel(month)}. Removing someone here only affects this month — past and future months keep their own rosters. Use the month arrows above to manage another month.</div>
      ${enrolled.length ? `<table class="summary"><thead><tr><th>Name</th><th>Phone</th><th style="min-width:200px;">Comments</th><th></th></tr></thead>
        <tbody>${enrolled.map(s=>row(s)).join('')}</tbody></table>`
        : `<div class="empty"><div class="e-title">No students in ${monthLabel(month)}</div>Add a new student above${notIn.length?', or re-add a returning student below.':'.'}</div>`}
    </div>
    ${notIn.length ? `
      <button class="archived-toggle" onclick="UI.showArchivedStudents=!UI.showArchivedStudents; render();">
        ${UI.showArchivedStudents ? 'Hide' : 'Show'} students not in ${monthLabel(month)} (${notIn.length})
      </button>
      ${UI.showArchivedStudents ? `
        <div class="card" style="margin-top:10px;">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
            <div style="font-size:12.5px;color:var(--text-soft);">These students are in this batch but not part of ${monthLabel(month)}. Tap "Add to month" if they're back this month.</div>
            <button class="btn small" onclick="enrollAllInMonth('${batch.id}','${month}')">+ Add all to ${monthLabel(month).split(' ')[0]}</button>
          </div>
          <table class="summary"><thead><tr><th>Name</th><th>Phone</th><th></th></tr></thead>
          <tbody>${notIn.map(s=>`<tr>
            <td><div class="student-name">${escapeHtml(s.name)}</div></td>
            <td>${escapeHtml(s.phone||'—')}</td>
            <td class="row-actions">
              <button class="btn small" onclick="enrollInMonth('${s.id}','${batch.id}','${month}')">+ Add to ${monthLabel(month).split(' ')[0]}</button>
              <button class="btn danger" onclick="openModal('confirmDeleteStudent', {id:'${s.id}'})">Delete</button>
            </td></tr>`).join('')}</tbody></table>
        </div>` : ''}
    ` : ''}
  `;
}

/* ---------- MODALS ---------- */
function renderModal(){
  if(!UI.modal) return '';
  const {type, payload} = UI.modal;
  if(type==='addBatch'){
    return `<div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Add a batch</h3>
        <div class="field"><label>Batch name</label><input id="m-batch-name" type="text" placeholder="e.g. Hip-Hop Beginners" autofocus/></div>
        <div class="modal-actions">
          <button class="btn secondary" onclick="closeModal()">Cancel</button>
          <button class="btn" onclick="submitAddBatch()">Add batch</button>
        </div>
      </div>
    </div>`;
  }
  if(type==='addStudent'){
    return `<div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Add a student</h3>
        <div class="field"><label>Name</label><input id="m-student-name" type="text" placeholder="Student name" autofocus/></div>
        <div class="field"><label>Phone</label><input id="m-student-phone" type="text" placeholder="Optional"/></div>
        <div class="field"><label>Plan</label><input id="m-student-plan" type="text" placeholder="e.g. 1 Month, 3 Months"/></div>
        <div class="modal-actions">
          <button class="btn secondary" onclick="closeModal()">Cancel</button>
          <button class="btn" onclick="submitAddStudent()">Add student</button>
        </div>
      </div>
    </div>`;
  }
  if(type==='editStudent'){
    const s = DB.students.find(x=>x.id===payload.id);
    if(!s) return '';
    return `<div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Edit student</h3>
        <div class="field"><label>Name</label><input id="m-student-name" type="text" value="${escapeHtml(s.name)}"/></div>
        <div class="field"><label>Phone</label><input id="m-student-phone" type="text" value="${escapeHtml(s.phone||'')}"/></div>
        <div class="field"><label>Plan</label><input id="m-student-plan" type="text" value="${escapeHtml(s.plan||'')}"/></div>
        <div class="field"><label>Comments</label><input id="m-student-notes" type="text" value="${escapeHtml(s.notes||'')}" placeholder="Pending fees, carry-forward…"/></div>
        <div class="modal-actions" style="justify-content:space-between;">
          <button class="btn danger" onclick="openModal('confirmDeleteStudent', {id:'${s.id}'})">Remove student</button>
          <div style="display:flex;gap:8px;">
            <button class="btn secondary" onclick="closeModal()">Cancel</button>
            <button class="btn" onclick="submitEditStudent('${s.id}')">Save</button>
          </div>
        </div>
      </div>
    </div>`;
  }
  if(type==='confirmDeleteStudent'){
    const s = DB.students.find(x=>x.id===payload.id);
    if(!s) return '';
    return `<div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Delete "${escapeHtml(s.name)}" completely?</h3>
        <p style="font-size:13.5px;color:var(--ink-soft);margin:0 0 4px;">
          This permanently removes the student from <strong>every month</strong> and deletes all their attendance &amp; fee records in this batch. This can't be undone.
          (If they've just stopped for this month but may return, use <strong>"Remove from month"</strong> instead — that keeps their history.)
        </p>
        <div class="modal-actions">
          <button class="btn secondary" onclick="closeModal()">Cancel</button>
          <button class="btn" style="background:var(--absent);" onclick="deleteStudent('${s.id}')">Delete permanently</button>
        </div>
      </div>
    </div>`;
  }
  if(type==='removeBatch'){
    const b = DB.batches.find(x=>x.id===payload.id);
    if(!b) return '';
    return `<div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Remove "${escapeHtml(b.name)}"?</h3>
        <p style="font-size:13.5px;color:var(--ink-soft);margin:0 0 4px;">
          It'll disappear from your batch list, but its students, attendance and fee history are kept safe —
          you can restore it anytime from "Show removed batches" at the bottom of the sidebar.
        </p>
        <div class="modal-actions">
          <button class="btn secondary" onclick="closeModal()">Cancel</button>
          <button class="btn" style="background:var(--absent);" onclick="confirmRemoveBatch('${b.id}')">Remove batch</button>
        </div>
      </div>
    </div>`;
  }
  if(type==='confirmLeave'){
    return `<div class="overlay">
      <div class="modal">
        <h3>All Attendance Not Marked Yet</h3>
        <p style="font-size:14px;color:var(--ink-soft);margin:0 0 4px;">Are you sure you want to leave?</p>
        <div class="modal-actions">
          <button class="btn secondary" onclick="confirmLeaveYes()">Yes, Exit</button>
          <button class="btn" onclick="confirmLeaveNo()">No, Go Back To Sheet</button>
        </div>
      </div>
    </div>`;
  }
  return '';
}

/* ============================= UTIL ============================= */
function escapeHtml(str){
  return String(str==null?'':str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function formatNum(n){ return Math.round(n).toLocaleString('en-IN'); }

window.addEventListener('beforeunload', function(e){
  // Browsers (Chrome/Firefox/Safari) only show their OWN generic "leave site?" prompt here —
  // they ignore custom text/buttons for security reasons. The custom worded popup with
  // "Yes Exit" / "No, Go Back To Sheet" buttons is handled in-app by guardedNav() instead.
  if(needsLeaveConfirm()){
    e.preventDefault();
    e.returnValue = '';
    return '';
  }
});

init();
</script>
</body>
</html>
